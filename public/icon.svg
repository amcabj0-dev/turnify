<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0D1B2A"/>
  <!-- Línea izquierda completa -->
  <line x1="28" y1="22" x2="28" y2="72" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <!-- Línea arriba (sin tocar esquina derecha) -->
  <line x1="28" y1="22" x2="62" y2="22" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <!-- Línea derecha completa -->
  <line x1="72" y1="32" x2="72" y2="78" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <!-- Línea abajo (sin tocar esquina izquierda) -->
  <line x1="38" y1="78" x2="72" y2="78" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <!-- S -->
  <text x="50" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="46" font-weight="400" fill="white">S</text>
</svg>